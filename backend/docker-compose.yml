services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    # Chỉ giữ lại các biến thực sự cần cho DB để tránh lộ secret
    environment:
      POSTGRES_DB: ${DB_NAME:-floodhelper}
      POSTGRES_USER: ${DB_USER:-floodhelper_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-floodhelper_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-floodhelper_user} -d ${DB_NAME:-floodhelper}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          memory: 256M # Khắc phục cảnh báo missing memory
    networks:
      - floodhelper_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        reservations:
          memory: 128M
    networks:
      - floodhelper_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${DB_USER:-floodhelper_user}:${DB_PASSWORD:-floodhelper_password}@postgres:5432/${DB_NAME:-floodhelper}?schema=${DB_SCHEMA:-public}
    healthcheck:
      # Thêm healthcheck để Defang biết khi nào app sẵn sàng
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - floodhelper_network

networks:
  floodhelper_network: