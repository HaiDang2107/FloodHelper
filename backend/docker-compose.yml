version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: floodhelper_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - floodhelper_network

  redis:
    image: redis:alpine
    container_name: floodhelper_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - floodhelper_network

  # Uncomment this section when you want to run the NestJS app in Docker
  # app:
  #   build: .
  #   container_name: floodhelper_app
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: floodhelper
  #     DB_USER: floodhelper_user
  #     DB_PASSWORD: floodhelper_password
  #     DB_SCHEMA: public
  #     JWT_SECRET: your-jwt-secret-key
  #     AT_SECRET: your-access-token-secret
